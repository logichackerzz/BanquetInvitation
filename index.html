<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#130404" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>黃鎮岳先生 八十大壽 壽宴邀請</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep:     #130404;
      --gold:     #D4AF37;
      --gold-dim: rgba(212,175,55,.32);
      --cream:    #F5E6A3;
    }

    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      overscroll-behavior-y: none;
    }

    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--deep);
      color: var(--cream);
      overflow-x: hidden;
    }

    #canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    /* ─── nav dots ─── */
    .dots {
      position: fixed; right: 16px; top: 50%;
      transform: translateY(-50%);
      z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      border: 1px solid var(--gold);
      background: transparent;
      cursor: pointer;
      transition: all .3s;
      padding: 10px; margin: -10px; /* 放大觸控區，視覺不變 */
      touch-action: manipulation;
    }
    .dot.on { background: var(--gold); box-shadow: 0 0 7px var(--gold); }

    /* ─── sections ─── */
    section {
      height: 100vh;
      height: 100svh;
      scroll-snap-align: start;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ─── corner ornaments ─── */
    .c {
      position: absolute;
      width: 55px; height: 55px;
      border: 1px solid var(--gold-dim);
    }
    .c::after {
      content: '◈'; position: absolute;
      color: var(--gold-dim); font-size: 9px;
    }
    .c.tl { top:16px; left:16px; border-right:none; border-bottom:none; }
    .c.tl::after { top:-6px; left:-6px; }
    .c.tr { top:16px; right:16px; border-left:none; border-bottom:none; }
    .c.tr::after { top:-6px; right:-6px; }
    .c.bl { bottom:16px; left:16px; border-right:none; border-top:none; }
    .c.bl::after { bottom:-6px; left:-6px; }
    .c.br { bottom:16px; right:16px; border-left:none; border-top:none; }
    .c.br::after { bottom:-6px; right:-6px; }

    /* ─── divider ─── */
    .hr {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin: 10px 0;
    }
    .hr::before, .hr::after {
      content: ''; height: 1px; width: 52px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .hr span { color: var(--gold); font-size: 8px; }

    /* ═══════════ PAGE 1 ═══════════ */
    #p1 {
      background: radial-gradient(ellipse at 50% 38%, #3D0A0A 0%, #1E0505 55%, var(--deep) 100%);
    }

    .p1-body { text-align: center; z-index: 10; padding: 0 20px; }

    /* 手機優先：壽字用 vw，桌機限制上限 */
    .shou {
      font-size: 38vw;
      color: var(--gold);
      line-height: 1;
      animation: glow 3s ease-in-out infinite, fadeUp 1.2s ease .1s both;
      text-shadow: 0 0 40px rgba(212,175,55,.9), 0 0 80px rgba(212,175,55,.4);
    }

    .p1-name {
      font-size: 5vw;
      letter-spacing: .15em;
      font-weight: 500;
      animation: fadeUp 1.2s ease .5s both;
    }

    .p1-title {
      font-size: 9.5vw;
      color: var(--gold);
      letter-spacing: .22em;
      font-weight: 700;
      text-shadow: 0 2px 12px rgba(212,175,55,.5);
      animation: fadeUp 1.2s ease .8s both;
    }

    .p1-date {
      font-size: 3.2vw;
      color: rgba(245,230,163,.6);
      letter-spacing: .08em;
      animation: fadeUp 1.2s ease 1.1s both;
      margin-top: 4px;
    }

    .scroll-hint {
      position: absolute; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      color: rgba(212,175,55,.45);
      font-size: 11px; letter-spacing: .15em;
      white-space: nowrap;
      animation: bob 2.2s ease-in-out infinite;
    }
    .scroll-hint::after {
      content: ''; display: block;
      width: 1px; height: 24px; margin: 7px auto 0;
      background: linear-gradient(to bottom, rgba(212,175,55,.45), transparent);
    }

    /* ═══════════ PAGE 2 ═══════════ */
    #p2 {
      background: linear-gradient(140deg, #1A0505 0%, #2C0707 50%, #1A0505 100%);
    }

    .p2-body {
      z-index: 10; text-align: center;
      width: 88%; max-width: 480px;
    }

    .sec-title {
      font-size: 4.5vw;
      color: var(--gold); letter-spacing: .3em;
      margin-bottom: 18px;
    }
    .sec-title::before, .sec-title::after {
      content: '❖ '; font-size: 10px; opacity: .65;
    }

    .card {
      border: 1px solid var(--gold-dim);
      padding: 24px 20px;
      position: relative;
    }
    .card::before {
      content: ''; position: absolute; inset: 6px;
      border: 1px solid rgba(212,175,55,.1);
      pointer-events: none;
    }

    .intro-txt {
      font-size: 3.8vw;
      color: rgba(245,230,163,.75);
      letter-spacing: .1em; line-height: 2;
      margin-bottom: 20px;
    }

    .row {
      display: flex; gap: 12px; align-items: flex-start;
      margin: 14px 0; text-align: left;
    }
    .ico { font-size: 16px; min-width: 20px; margin-top: 2px; }
    .lbl {
      font-size: 10px; color: rgba(212,175,55,.6);
      letter-spacing: .2em; margin-bottom: 3px;
    }
    .val {
      font-size: 3.8vw;
      color: var(--cream); letter-spacing: .06em; font-weight: 500;
      line-height: 1.5;
    }

    /* ═══════════ PAGE 3 ═══════════ */
    #p3 {
      background: radial-gradient(ellipse at 50% 60%, #2C0707 0%, #180404 55%, var(--deep) 100%);
    }

    .p3-body {
      z-index: 10; text-align: center;
      width: 88%; max-width: 420px;
    }

    .p3-main {
      font-size: 10vw;
      color: var(--gold); letter-spacing: .3em;
      font-weight: 700;
      text-shadow: 0 0 22px rgba(212,175,55,.5);
      margin-bottom: 12px;
    }

    .p3-sub {
      font-size: 3.8vw;
      color: rgba(245,230,163,.72);
      letter-spacing: .12em; line-height: 2.1;
      margin-bottom: 28px;
    }

    /* 聯絡電話（非 RSVP）*/
    .contact {
      margin: 0 auto 24px;
    }
    .contact-lbl {
      font-size: 10px; color: rgba(212,175,55,.6);
      letter-spacing: .3em; margin-bottom: 8px;
    }
    .contact-num {
      display: block;
      font-size: 7.5vw;
      color: var(--gold); letter-spacing: .15em; font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(212,175,55,.3);
      padding-bottom: 4px;
      transition: opacity .2s;
    }
    .contact-num:active { opacity: .65; }

    .sig {
      border-top: 1px solid rgba(212,175,55,.18);
      padding-top: 20px;
      margin-top: 4px;
    }
    .sig-lbl {
      font-size: 10px; color: rgba(212,175,55,.55);
      letter-spacing: .3em; margin-bottom: 8px;
    }
    .sig-names {
      font-size: 4.8vw;
      letter-spacing: .25em; font-weight: 500;
    }

    /* ─── reveal ─── */
    .rev {
      opacity: 0; transform: translateY(18px);
      transition: opacity .85s ease, transform .85s ease;
    }
    .rev.on { opacity: 1; transform: none; }
    .rev.d1 { transition-delay: .12s; }
    .rev.d2 { transition-delay: .28s; }
    .rev.d3 { transition-delay: .46s; }

    /* ─── keyframes ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 40px rgba(212,175,55,.9), 0 0 80px rgba(212,175,55,.4); }
      50%      { text-shadow: 0 0 65px #D4AF37, 0 0 130px rgba(212,175,55,.55); }
    }
    @keyframes bob {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(-6px); }
    }

    /* ─── 桌機尺寸蓋回去 ─── */
    @media (min-width: 768px) {
      .shou      { font-size: 180px; }
      .p1-name   { font-size: 28px; letter-spacing: .3em; }
      .p1-title  { font-size: 50px; letter-spacing: .4em; }
      .p1-date   { font-size: 16px; letter-spacing: .15em; }
      .sec-title { font-size: 20px; letter-spacing: .4em; }
      .intro-txt { font-size: 15px; letter-spacing: .14em; }
      .val       { font-size: 16px; letter-spacing: .08em; }
      .p3-main   { font-size: 44px; letter-spacing: .45em; }
      .p3-sub    { font-size: 15px; letter-spacing: .18em; }
      .contact-num { font-size: 28px; }
      .sig-names { font-size: 19px; letter-spacing: .3em; }
      .c         { width: 90px; height: 90px; }
      .card      { padding: 32px 38px; }
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<nav class="dots">
  <div class="dot on" onclick="go(0)"></div>
  <div class="dot"    onclick="go(1)"></div>
  <div class="dot"    onclick="go(2)"></div>
</nav>

<!-- ══════ PAGE 1 ══════ -->
<section id="p1">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>

  <div class="p1-body">
    <div class="shou">壽</div>
    <div class="hr"><span>✦</span></div>
    <div class="p1-name">黃鎮岳 先生</div>
    <div class="p1-title">八十大壽</div>
    <div class="hr" style="margin-top:14px"><span>✦</span></div>
    <div class="p1-date">民國一一五年　五月三十日（星期六）</div>
  </div>

  <div class="scroll-hint">往下滑動</div>
</section>

<!-- ══════ PAGE 2 ══════ -->
<section id="p2">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>

  <div class="p2-body">
    <div class="sec-title rev">壽宴邀請</div>

    <div class="card rev d1">
      <div class="intro-txt">
        謹此敬邀諸位親友<br>
        蒞臨共賀，同享壽筵之歡
      </div>

      <div class="row rev d1">
        <div class="ico"></div>
        <div>
          <div class="lbl">日　期</div>
          <div class="val">民國一一五年 五月三十日（星期六）</div>
        </div>
      </div>

      <div class="row rev d2">
        <div class="ico"></div>
        <div>
          <div class="lbl">時　間</div>
          <div class="val">中午十二時正</div>
        </div>
      </div>

      <div class="row rev d3">
        <div class="ico"></div>
        <div>
          <div class="lbl">地　點</div>
          <div class="val">寒軒大飯店（和平店）三樓</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ══════ PAGE 3 ══════ -->
<section id="p3">
  <div class="c tl"></div><div class="c tr"></div>
  <div class="c bl"></div><div class="c br"></div>

  <div class="p3-body">
    <div class="p3-main rev">敬候光臨</div>
    <div class="p3-sub rev d1">
      承蒙厚愛，不勝感激<br>
      期待與您共度這份珍貴時光
    </div>

    <div class="contact rev d2">
      <div class="contact-lbl">如有詢問</div>
      <a href="tel:0915757503" class="contact-num">0915-757-503</a>
    </div>

    <div class="sig rev d3">
      <div class="sig-lbl">子女敬邀</div>
      <div class="sig-names">黃珮詩　　黃孝軒</div>
    </div>
  </div>
</section>

<script>
// ── Falling petals ──
const cv  = document.getElementById('canvas');
const ctx = cv.getContext('2d');

function resize() { cv.width = innerWidth; cv.height = innerHeight; }
resize();
addEventListener('resize', resize);

const isMobile = innerWidth < 768 || /Mobi|Android/i.test(navigator.userAgent);
const P = Array.from({length: isMobile ? 20 : 42}, () => makePetal(true));

function makePetal(spread) {
  return {
    x:   Math.random() * innerWidth,
    y:   spread ? Math.random() * innerHeight : -15,
    sz:  Math.random() * 6 + 3,
    vx:  (Math.random() - .5) * 1.1,
    vy:  Math.random() * 1.2 + .5,
    rot: Math.random() * Math.PI * 2,
    dr:  (Math.random() - .5) * .04,
    a:   Math.random() * .5 + .15,
    sw:  Math.random() * .022,
    swO: Math.random() * Math.PI * 2,
    col: ['#E8909A','#C85070','#F2B8C2','#D4AF37'][Math.floor(Math.random()*4)]
  };
}

function drawP(p) {
  ctx.save();
  ctx.globalAlpha = p.a;
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.beginPath();
  ctx.moveTo(0, -p.sz);
  ctx.bezierCurveTo( p.sz*.75, -p.sz*.4,  p.sz*.75,  p.sz*.4, 0,  p.sz);
  ctx.bezierCurveTo(-p.sz*.75,  p.sz*.4, -p.sz*.75, -p.sz*.4, 0, -p.sz);
  ctx.fillStyle = p.col;
  ctx.fill();
  ctx.restore();
}

let t = 0;
function loop() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  t += .012;
  P.forEach((p, i) => {
    p.x   += p.vx + Math.sin(t + p.swO) * p.sw * 26;
    p.y   += p.vy;
    p.rot += p.dr;
    if (p.y > innerHeight + 20) P[i] = makePetal(false);
    drawP(p);
  });
  requestAnimationFrame(loop);
}
loop();

// ── Section nav ──
const secs = document.querySelectorAll('section');
const dots = document.querySelectorAll('.dot');

const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    e.target.querySelectorAll('.rev').forEach(el => el.classList.add('on'));
    const idx = [...secs].indexOf(e.target);
    dots.forEach((d, i) => d.classList.toggle('on', i === idx));
  });
}, { threshold: .45 });

secs.forEach(s => io.observe(s));

function go(i) { secs[i].scrollIntoView({ behavior: 'smooth' }); }
</script>
</body>
</html>
